services:
  - type: worker
    name: bot-telegram
    env: node
    plan: starter
    buildCommand: PUPPETEER_CACHE_DIR=.puppeteer-cache npm ci && PUPPETEER_CACHE_DIR=.puppeteer-cache npx puppeteer browsers install chrome
    startCommand: npm run start:render
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPPORT_USERNAME
        value: CvSupport1
      - key: DB_PATH
        value: /var/data/database.sqlite
      - key: PDF_OUTPUT_DIR
        value: /var/data/pdf_output
      - key: PUPPETEER_CACHE_DIR
        value: .puppeteer-cache
      - key: NODE_ENV
        value: production
